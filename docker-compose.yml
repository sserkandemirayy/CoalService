version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./src/Api
      dockerfile: Dockerfile
    container_name: auth_api
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=authdb;Username=authuser;Password=authpass;"
      JWT__Issuer: "AuthService"
      JWT__Audience: "AuthServiceAudience"
      JWT__Secret: "super_long_development_secret_change_me"
      JWT__AccessTokenMinutes: "15"
      JWT__RefreshTokenDays: "7"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dbdata:
